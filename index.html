<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Life Dashboard — Hub</title>
    <meta name="theme-color" content="#0d0b14" />
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS (for quick styling and responsiveness) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              bebas: ['"Bebas Neue"', 'sans-serif'],
              mono: ['"DM Mono"', 'monospace'],
            }
          }
        }
      }
    </script>
    
    <!-- PWA Settings -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="LifeDash">

    <style>
      :root {
        --font-bebas: "Bebas Neue", sans-serif;
        --font-mono: "DM Mono", monospace;
        --font-sans: "Inter", sans-serif;
        --bg-primary: #0d0b14;
        --text-primary: #e8e3f8;
        --text-secondary: #9991b8;
      }

      body {
        background-color: var(--bg-primary);
        color: var(--text-primary);
        font-family: var(--font-sans);
        min-height: 100vh;
        margin: 0;
        padding: 0;
        overflow-x: hidden;
      }

      /* Drifting glow elements in background */
      .bg-glow {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: -2;
        overflow: hidden;
        pointer-events: none;
      }

      .glow-circle-1 {
        position: absolute;
        top: -10%;
        right: -10%;
        width: 60vw;
        height: 60vw;
        background: radial-gradient(circle, rgba(107, 227, 164, 0.06) 0%, rgba(13, 11, 20, 0) 70%);
        border-radius: 50%;
        animation: drift 25s infinite alternate ease-in-out;
      }

      .glow-circle-2 {
        position: absolute;
        bottom: -10%;
        left: -10%;
        width: 50vw;
        height: 50vw;
        background: radial-gradient(circle, rgba(125, 211, 252, 0.06) 0%, rgba(13, 11, 20, 0) 70%);
        border-radius: 50%;
        animation: drift 30s infinite alternate-reverse ease-in-out;
      }

      @keyframes drift {
        0% {
          transform: translate(0, 0) scale(1);
        }
        100% {
          transform: translate(60px, 40px) scale(1.1);
        }
      }

      /* Sub-pixel dot pattern backdrop */
      .dot-texture {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: -1;
        pointer-events: none;
        background-image: radial-gradient(rgba(240, 201, 114, 0.05) 1.5px, transparent 1.5px);
        background-size: 24px 24px;
        opacity: 0.8;
      }

      /* Premium gradient heading based on .dash-title specifications */
      .dash-title {
        font-family: var(--font-bebas);
        font-size: 3.5rem;
        font-weight: bold;
        letter-spacing: 0.15em;
        line-height: 1.1;
        background: linear-gradient(135deg, #f0c972 0%, #e07b3f 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        text-fill-color: transparent;
        display: inline-block;
        animation: pulseGradient 6s infinite alternate ease-in-out;
      }

      @keyframes pulseGradient {
        0% {
          filter: brightness(1);
        }
        100% {
          filter: brightness(1.15);
        }
      }

      /* Bento Grid System */
      .bento-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        grid-auto-rows: 168px;
        gap: 14px;
        grid-auto-flow: dense;
        width: 100%;
        max-width: 900px;
        margin: 0 auto;
      }

      /* Bento glass cards */
      .glass-card {
        position: relative;
        display: flex;
        flex-direction: column;
        border-radius: 18px;
        padding: 22px;
        background: rgba(19, 17, 31, 0.45);
        border: 1px solid rgba(42, 36, 64, 0.5);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        text-decoration: none;
        color: inherit;
        transition: transform 0.28s cubic-bezier(0.25, 1, 0.5, 1), 
                    border-color 0.28s cubic-bezier(0.25, 1, 0.5, 1), 
                    box-shadow 0.28s cubic-bezier(0.25, 1, 0.5, 1);
        overflow: hidden;
      }

      /* Pseudo glow effect on borders and backgrounds */
      .glass-card::before {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: 18px;
        padding: 1px;
        background: linear-gradient(to bottom, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0/*test*/));
        -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        -webkit-mask-composite: xor;
        mask-composite: exclude;
        pointer-events: none;
      }

      /* Accent variables & glowing shadows dynamically from custom styling overrides */
      .glass-card:hover {
        transform: translateY(-4px);
        border-color: var(--accent);
        box-shadow: 0 12px 35px -10px rgba(0, 0, 0, 0.5),
                    0 0 20px 0 var(--accent-glow);
      }

      .glass-card:hover .card-arrow {
        transform: translateX(5px);
      }

      /* Card components */
      .glass-card.big {
        grid-column: span 2;
        grid-row: span 2;
        min-height: 350px;
      }

      .glass-card.wide {
        grid-column: span 2;
      }

      .card-header-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: 100%;
        margin-bottom: auto;
      }

      .mono-number {
        font-family: var(--font-mono);
        font-size: 13px;
        color: var(--text-secondary);
        letter-spacing: 0.05em;
        opacity: 0.85;
      }

      .emoji-badge {
        font-size: 26px;
        line-height: 1;
        filter: drop-shadow(0 0 10px var(--accent));
        transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      }

      .glass-card:hover .emoji-badge {
        transform: scale(1.1) rotate(5deg);
      }

      .card-title-text {
        font-size: 24px;
        font-weight: 700;
        letter-spacing: -0.02em;
        color: #ffffff;
        margin-top: auto;
        margin-bottom: 2px;
      }

      .card-footer-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: 100%;
        margin-top: 8px;
      }

      .card-subtitle-text {
        font-size: 13px;
        color: var(--text-secondary);
        font-weight: 400;
        letter-spacing: -0.01em;
      }

      .card-arrow {
        font-size: 20px;
        font-weight: bold;
        color: var(--accent);
        transition: transform 0.28s cubic-bezier(0.25, 1, 0.5, 1);
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* Custom Selection highlights */
      ::selection {
        background: rgba(240, 201, 114, 0.18);
        color: #fbd38d;
      }

      /* Responsive Layout Configuration */
      @media (max-width: 720px) {
        .bento-grid {
          grid-template-columns: repeat(2, 1fr);
          padding: 0 16px;
        }
        .glass-card.big {
          grid-column: span 2;
          grid-row: span 1;
          min-height: 168px;
        }
      }

      @media (max-width: 440px) {
        .bento-grid {
          grid-template-columns: 1fr;
          grid-auto-rows: auto;
          gap: 12px;
        }
        .glass-card.big {
          grid-column: span 1;
          grid-row: span 1;
          min-height: 154px;
        }
        .glass-card.wide {
          grid-column: span 1;
          min-height: 154px;
        }
        .glass-card {
          padding: 18px;
          min-height: 144px;
        }
      }
    </style>
  </head>
  <body class="selection:bg-[#f0c97230]">
    <!-- Animated Drifting Glow Backdrops -->
    <div class="bg-glow">
      <div class="glow-circle-1"></div>
      <div class="glow-circle-2"></div>
    </div>
    
    <!-- Fine-grain Dot Overlay Grid -->
    <div class="dot-texture"></div>

    <div class="min-h-screen flex flex-col justify-center items-center px-4 py-12 md:py-20 select-none">
      <div class="w-full max-w-4xl text-center mb-10 md:mb-14">
        <h1 class="dash-title">Dashboard</h1>
        <p class="font-mono text-[10px] text-[#6b6485] tracking-widest uppercase mt-2">
          Unified Wellness & Performance Hub
        </p>
      </div>

      <!-- Bento Grid Containers -->
      <div class="bento-grid" id="dashboard-hub">
        
        <!-- Tile 1: Main (Big) -->
        <a href="/main.html?tab=home" class="glass-card big" style="--accent: #6BE3A4; --accent-glow: rgba(107, 227, 164, 0.12)">
          <div class="card-header-row">
            <span class="mono-number">·01</span>
            <span class="emoji-badge">🏠</span>
          </div>
          <div class="card-title-text">Main</div>
          <div class="card-footer-row">
            <span class="card-subtitle-text">Goals & daily plan</span>
            <span class="card-arrow">→</span>
          </div>
        </a>

        <!-- Tile 2: Fitness (Wide) -->
        <a href="/main.html?tab=fitness" class="glass-card wide" style="--accent: #7DD3FC; --accent-glow: rgba(125, 211, 252, 0.12)">
          <div class="card-header-row">
            <span class="mono-number">·02</span>
            <span class="emoji-badge">💪</span>
          </div>
          <div class="card-title-text">Fitness</div>
          <div class="card-footer-row">
            <span class="card-subtitle-text">Workouts, splits, sessions</span>
            <span class="card-arrow">→</span>
          </div>
        </a>

        <!-- Tile 3: Health (Small) -->
        <a href="/main.html?tab=health" class="glass-card" style="--accent: #A7F3D0; --accent-glow: rgba(167, 243, 208, 0.12)">
          <div class="card-header-row">
            <span class="mono-number">·03</span>
            <span class="emoji-badge">💊</span>
          </div>
          <div class="card-title-text">Health</div>
          <div class="card-footer-row">
            <span class="card-subtitle-text">Macros & vitals</span>
            <span class="card-arrow">→</span>
          </div>
        </a>

        <!-- Tile 4: Calendar (Small) -->
        <a href="/main.html?tab=calendar" class="glass-card" style="--accent: #F0C972; --accent-glow: rgba(240, 201, 114, 0.12)">
          <div class="card-header-row">
            <span class="mono-number">·04</span>
            <span class="emoji-badge">📅</span>
          </div>
          <div class="card-title-text">Calendar</div>
          <div class="card-footer-row">
            <span class="card-subtitle-text">Events & sync</span>
            <span class="card-arrow">→</span>
          </div>
        </a>

        <!-- Tile 5: AI Wellness Coach (Small) -->
        <a href="/main.html?tab=ai" class="glass-card" style="--accent: #fbcfe8; --accent-glow: rgba(251, 207, 232, 0.12)">
          <div class="card-header-row">
            <span class="mono-number">·05</span>
            <span class="emoji-badge">🤖</span>
          </div>
          <div class="card-title-text">AI Coach</div>
          <div class="card-footer-row">
            <span class="card-subtitle-text">Personal wellness advice</span>
            <span class="card-arrow">→</span>
          </div>
        </a>

        <!-- Tile 6: Caffeine (Small) -->
        <a href="/main.html?tab=caffeine" class="glass-card" style="--accent: #C9A36B; --accent-glow: rgba(201, 163, 107, 0.12)">
          <div class="card-header-row">
            <span class="mono-number">·06</span>
            <span class="emoji-badge">☕</span>
          </div>
          <div class="card-title-text">Caffeine</div>
          <div class="card-footer-row">
            <span class="card-subtitle-text">Intake & timing</span>
            <span class="card-arrow">→</span>
          </div>
        </a>

      </div>
    </div>

    <!-- Supabase JS Client Integration -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </body>
</html>
